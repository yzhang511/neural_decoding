seed: 42

dirs:
  checkpoint_dir: checkpoints  
  log_dir: train_logs  
  data_dir: datasets/processed
  output_dir: results

training:
  num_epochs: 1000
  batch_size: 128

  device: gpu
  metric: val_loss
  mode: min
  enable_progress_bar: true
  load_local: true

model: 
  model_class: DECODER   
  target: clf         
  output_size: 3       

data:
  dataset_class: decoding 

  train_name: train   
  test_name: test     
  train_len: null     
  test_len: null      

  num_workers: 1

optimizer:
  lr: 0.001
  scheduler: cosine  # step/cosine/linear
  weight_decay: 1

tuner:
  num_epochs: 1000
  num_samples: 50
  use_gpu: true
  num_workers: 1
  metric: val_loss
  mode: min
  enable_progress_bar: true

