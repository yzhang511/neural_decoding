seed: 42

dirs:
  checkpoint_dir: checkpoints  
  log_dir: train_logs  
  data_dir: ibl_aligned   # Change this if you want to use a different fold for cross-validation
  output_dir: results

training:
  num_epochs: 1000
  batch_size: 16

  device: gpu
  metric: val_metric
  mode: max
  enable_progress_bar: true
  load_local: true

model: 
  model_class: DECODER   
  target: clf         
  output_size: 2       

data:
  dataset_class: decoding 

  train_name: train   
  test_name: test     
  train_len: null     
  test_len: null      

  num_workers: 1

optimizer:
  lr: 0.01
  scheduler: cosine  # step/cosine/linear
  weight_decay: 1

tuner:
  num_epochs: 1000
  num_samples: 30    # number of random models to sample from
  use_gpu: true      # false if not using ray tune on gpus
  num_workers: 1
  metric: val_metric
  mode: max
  enable_progress_bar: true